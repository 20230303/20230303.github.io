<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="assets/js/canvas-nest.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#10b981',
                        dark: '#1f2937',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto { content-visibility: auto; }
            .card-hover { @apply transition-all duration-300 hover:shadow-lg hover:-translate-y-1; }
        }
        html { scroll-behavior: smooth; }
        .particle-layer {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .particle-layer canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        /* 内容上浮动画 */
        .fade-up {
            animation: fadeUp 0.8s ease-out;
        }
        @keyframes fadeUp {
            from { 
                opacity: 0;
                transform: translateY(20px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 展开动画 */
        .game-detail {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-out, padding 0.3s ease;
        }
        .game-detail.expanded {
            max-height: 2000px;
            transition: max-height 0.8s ease-in;
        }
        
        /* 旋转箭头 */
        .expand-arrow {
            transition: transform 0.3s ease;
        }
        .expanded .expand-arrow {
            transform: rotate(180deg);
        }
        
        /* 图片轮播 */
        .carousel-container {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
        }
        .carousel-track {
            display: flex;
            transition: transform 0.5s ease;
        }
        .carousel-slide {
            min-width: 100%;
            height: 300px;
            object-fit: cover;
        }
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }
        .carousel-btn:hover {
            background: rgba(0,0,0,0.7);
        }
        .carousel-btn.prev { left: 10px; }
        .carousel-btn.next { right: 10px; }
        .carousel-dots {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }
        .carousel-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: background 0.3s;
        }
        .carousel-dot.active {
            background: white;
        }
        
        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>

    let currentGames = DEFAULT_GAMES;

    function initParticleBackground(containerId, options = {}) {
        const container = document.getElementById(containerId);
        if (!container || typeof window.CanvasNest !== 'function') return;
        if (container.dataset.particleInitialized === 'true') return;

        container.dataset.particleInitialized = 'true';
        new window.CanvasNest(container, {
            color: '99,102,241',
            pointColor: '16,185,129',
            count: 70,
            opacity: 0.7,
            zIndex: -1,
            lineWidth: 0.5,
            dist: 170,
            ...options
        });
    }

    // 图片轮播功能
    function initCarousel(cardId, images) {
        const container = document.getElementById(`carousel-${cardId}`);
        if (!container || images.length <= 1) return;

        const track = container.querySelector('.carousel-track');
        const dotsContainer = container.querySelector('.carousel-dots');
        let currentIndex = 0;

        // 创建图片
        track.innerHTML = images.map(img => 
            `<img src="${img}" class="carousel-slide" onerror="this.src='https://picsum.photos/800/400?text=Game'">`
        ).join('');

        // 创建指示点
        dotsContainer.innerHTML = images.map((_, i) => 
            `<span class="carousel-dot ${i === 0 ? 'active' : ''}" data-index="${i}"></span>`
        ).join('');

        // 切换图片
        function goToSlide(index) {
            currentIndex = (index + images.length) % images.length;
            track.style.transform = `translateX(-${currentIndex * 100}%)`;
            dotsContainer.querySelectorAll('.carousel-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === currentIndex);
            });
        }

        // 按钮事件
        container.querySelector('.prev').addEventListener('click', () => goToSlide(currentIndex - 1));
        container.querySelector('.next').addEventListener('click', () => goToSlide(currentIndex + 1));

        // 指示点事件
        dotsContainer.querySelectorAll('.carousel-dot').forEach(dot => {
            dot.addEventListener('click', (e) => {
                goToSlide(parseInt(e.target.dataset.index));
            });
        });
    }

    // 切换展开/收起
    function toggleDetail(cardId) {
        const detail = document.getElementById(`detail-${cardId}`);
        const card = document.getElementById(`card-${cardId}`);
        const isExpanded = detail.classList.contains('expanded');

        if (isExpanded) {
            detail.classList.remove('expanded');
            card.classList.remove('expanded');
        } else {
            detail.classList.add('expanded');
            card.classList.add('expanded');
        }
    }

    // 渲染游戏列表
    function renderGames(data) {
        // 处理游戏数据
        if (data.games && data.games.length > 0) {
            // 为 data.json 中的简单数据补充默认详情结构
            currentGames = data.games.map((g, i) => ({
                ...DEFAULT_GAMES[i % DEFAULT_GAMES.length],
                ...g
            }));
        } else {
            currentGames = DEFAULT_GAMES;
        }

        document.title = `游戏作品 - ${data.name || '个人主页'}`;
        document.getElementById("footerTitle").innerText = data.name || '个人主页';
        document.getElementById("footerCopyright").innerText = `© 2026 ${data.name || ''}. 保留所有权利`;

        // 渲染游戏列表
        const gameList = document.getElementById("gameList");
        if (currentGames.length) {
            gameList.innerHTML = "";
            currentGames.forEach((g, index) => {
                const card = document.createElement("div");
                card.id = `card-${index}`;
                card.className = "bg-white rounded-2xl shadow-md overflow-hidden fade-up";
                card.style.animationDelay = `${index * 0.15}s`;
                card.style.animationFillMode = "both";
                
                const images = g.images || [g.imgUrl];
                
                card.innerHTML = `
                    <!-- 卡片头部（可点击展开） -->
                    <div class="cursor-pointer" onclick="toggleDetail(${index})">
                        <div class="relative overflow-hidden">
                            <img src="${g.imgUrl}" class="w-full h-56 object-cover transition-transform duration-500 hover:scale-105" onerror="this.src='https://picsum.photos/800/400?text=Game'">
                            <div class="absolute top-4 right-4">
                                <span class="bg-white/90 backdrop-blur-sm text-gray-700 text-xs px-3 py-1 rounded-full font-medium">
                                    ${g.status || '开发中'}
                                </span>
                            </div>
                        </div>
                        <div class="p-6">
                            <div class="flex items-start justify-between mb-2">
                                <div>
                                    <h3 class="text-xl font-semibold text-gray-800">${g.title}</h3>
                                    <p class="text-primary text-sm font-medium">${g.subtitle || ''}</p>
                                </div>
                                <i class="fas fa-chevron-down expand-arrow text-gray-400 mt-2"></i>
                            </div>
                            <p class="text-gray-600 text-sm leading-relaxed mb-4">${g.desc || ''}</p>
                            <div class="flex flex-wrap gap-2">
                                ${(g.tags || []).map(tag => 
                                    `<span class="bg-gray-100 text-gray-600 text-xs px-3 py-1 rounded-full">${tag}</span>`
                                ).join('')}
                            </div>
                            <div class="mt-4 pt-4 border-t border-gray-100 flex items-center text-sm text-gray-500">
                                <i class="fas fa-user-tag mr-2"></i>
                                <span>职责：${g.role || '参与开发'}</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 展开详情 -->
                    <div id="detail-${index}" class="game-detail">
                        <div class="px-6 pb-6 pt-2 border-t border-gray-100">
                            <!-- 图片轮播 -->
                            <div id="carousel-${index}" class="carousel-container mb-6">
                                <div class="carousel-track"></div>
                                <button class="carousel-btn prev">
                                    <i class="fas fa-chevron-left"></i>
                                </button>
                                <button class="carousel-btn next">
                                    <i class="fas fa-chevron-right"></i>
                                </button>
                                <div class="carousel-dots"></div>
                            </div>
                            
                            <!-- 项目概述 -->
                            <div class="mb-6">
                                <h4 class="text-lg font-semibold text-gray-800 mb-3 flex items-center">
                                    <i class="fas fa-info-circle text-primary mr-2"></i>项目概述
                                </h4>
                                <p class="text-gray-600 text-sm leading-relaxed">
                                    ${g.detail?.overview || g.desc || ''}
                                </p>
                            </div>
                            
                            <!-- 核心特性 -->
                            <div class="mb-6">
                                <h4 class="text-lg font-semibold text-gray-800 mb-3 flex items-center">
                                    <i class="fas fa-star text-secondary mr-2"></i>核心特性
                                </h4>
                                <ul class="space-y-2">
                                    ${(g.detail?.features || []).map(f => `
                                        <li class="flex items-start text-sm text-gray-600">
                                            <i class="fas fa-check text-secondary mt-1 mr-3 flex-shrink-0"></i>
                                            <span>${f}</span>
                                        </li>
                                    `).join('')}
                                </ul>
                            </div>
                            
                            <!-- 个人职责 -->
                            <div>
                                <h4 class="text-lg font-semibold text-gray-800 mb-3 flex items-center">
                                    <i class="fas fa-briefcase text-primary mr-2"></i>个人职责
                                </h4>
                                <ul class="space-y-2">
                                    ${(g.detail?.responsibilities || []).map(r => `
                                        <li class="flex items-start text-sm text-gray-600">
                                            <i class="fas fa-angle-right text-primary mt-1 mr-3 flex-shrink-0"></i>
                                            <span>${r}</span>
                                        </li>
                                    `).join('')}
                                </ul>
                            </div>
                        </div>
                    </div>`;
                
                gameList.appendChild(card);
                
                // 初始化轮播
                setTimeout(() => initCarousel(index, images), 100);
            });
        } else {
            gameList.innerHTML = `
                <div class="col-span-full text-center py-20">
                    <div class="inline-flex items-center justify-center w-20 h-20 bg-gray-100 rounded-full mb-6">
                        <i class="fas fa-gamepad text-3xl text-gray-400"></i>
                    </div>
                    <h3 class="text-xl font-medium text-gray-500 mb-2">暂无游戏作品</h3>
                    <p class="text-gray-400">敬请期待...</p>
                </div>`;
        }
    }

    // 异步加载 data.json 并更新
    async function loadDataJson() {
        try {
            let res;
            
            // 先尝试本地加载（GitHub Pages 环境）
            try {
                res = await fetch(`data.json?t=${Date.now()}`);
            } catch (e) {
                // 本地 file:// 协议加载失败时，尝试从 GitHub 加载
                try {
                    res = await fetch(`https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${CONFIG.branch}/data.json?t=${Date.now()}`);
                } catch (e2) {
                    return; // 都失败了就保持默认数据
                }
            }
            
            if (res.ok) {
                const data = await res.json();
                renderGames(data);
            }
        } catch (e) {
            // 静默失败，保持默认数据
        }
    }

    // 初始化
    window.addEventListener('DOMContentLoaded', () => {
        initParticleBackground('pageParticleLayer');

        // 1. 立即用默认数据渲染（首屏无闪烁）
        renderGames({ name: '平行弧线/桃', games: null });
        // 2. 异步加载 data.json，成功则更新数据
        loadDataJson();
    });
</script>
</body>
