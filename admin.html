<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 游戏开发者主页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-50">
<div class="max-w-4xl mx-auto px-4 py-8">
    <div class="bg-white rounded-lg shadow p-6">
        <h1 class="text-2xl font-bold mb-6 text-indigo-600">主页管理后台</h1>

        <div class="mb-8 p-4 bg-gray-50 rounded-lg">
            <h2 class="font-bold mb-2">GitHub 配置</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div><label class="text-sm">用户名</label><input id="owner" class="w-full border px-3 py-2"></div>
                <div><label class="text-sm">仓库名</label><input id="repo" class="w-full border px-3 py-2"></div>
                <div><label class="text-sm">分支</label><input id="branch" class="w-full border px-3 py-2" value="main"></div>
                <div><label class="text-sm">Token</label><input id="token" type="password" class="w-full border px-3 py-2"></div>
            </div>
            <button onclick="saveConfig()" class="bg-indigo-600 text-white px-4 py-2 rounded">保存配置</button>
        </div>

        <!-- 头像 + 个人信息（已整合） -->
        <div class="mb-8">
            <h2 class="font-bold text-lg mb-4">个人信息 & 头像</h2>
            <div class="grid gap-4 mb-4">
                <div>
                    <label class="block text-sm mb-1">主页标题 / 姓名</label>
                    <input id="name" class="w-full border px-3 py-2">
                </div>
                <div>
                    <label class="block text-sm mb-1">个人介绍</label>
                    <textarea id="intro" rows="3" class="w-full border px-3 py-2"></textarea>
                </div>
                <div>
                    <label class="block text-sm mb-1">联系方式</label>
                    <input id="contact" class="w-full border px-3 py-2">
                </div>
                <!-- 头像上传 -->
                <div>
                    <label class="block text-sm mb-1">上传头像（替换首页头像）</label>
                    <input type="file" id="avatarFile" accept="image/*" class="w-full border px-3 py-2">
                </div>
            </div>
            <button onclick="saveInfoAndAvatar()" class="bg-green-600 text-white px-4 py-2 rounded">保存信息 + 头像</button>
        </div>

        <div class="mb-8">
            <h2 class="font-bold text-lg mb-4">新增游戏作品</h2>
            <div class="grid gap-4 mb-4">
                <input id="gameTitle" placeholder="作品名" class="border px-3 py-2">
                <textarea id="gameDesc" rows="2" placeholder="描述" class="border px-3 py-2"></textarea>
                <input type="file" id="gameImg" accept="image/*" class="border px-3 py-2">
            </div>
            <button onclick="uploadGame()" class="bg-green-600 text-white px-4 py-2 rounded">上传作品</button>
        </div>

        <div class="mb-8">
            <h2 class="font-bold text-lg mb-4">新增策划案</h2>
            <div class="grid gap-4 mb-4">
                <input id="designTitle" placeholder="标题" class="border px-3 py-2">
                <textarea id="designDesc" rows="2" placeholder="描述" class="border px-3 py-2"></textarea>
                <input type="file" id="designFile" class="border px-3 py-2">
            </div>
            <button onclick="uploadDesign()" class="bg-green-600 text-white px-4 py-2 rounded">上传策划案</button>
        </div>

        <div class="mb-8">
            <h2 class="font-bold text-lg mb-4">上传图像素材</h2>
            <input type="file" id="materialFiles" accept="image/*" multiple class="border px-3 py-2 mb-4">
            <button onclick="uploadMaterials()" class="bg-green-600 text-white px-4 py-2 rounded">上传素材</button>
        </div>

        <div id="message" class="p-4 rounded hidden mt-4"></div>
    </div>

    <div class="text-center text-sm text-gray-500 mt-4">
        <a href="index.html" class="text-indigo-600 hover:underline">返回主页</a>
    </div>
</div>

<script>
function saveConfig() {
    const c = {
        owner: document.getElementById("owner").value,
        repo: document.getElementById("repo").value,
        branch: document.getElementById("branch").value,
        token: document.getElementById("token").value
    };
    localStorage.setItem("githubConfig", JSON.stringify(c));
    showMessage("配置保存成功", "success");
}

window.onload = async () => {
    const c = JSON.parse(localStorage.getItem("githubConfig")) || {};
    document.getElementById("owner").value = c.owner || "";
    document.getElementById("repo").value = c.repo || "";
    document.getElementById("branch").value = c.branch || "main";
    document.getElementById("token").value = c.token || "";
    const d = await loadData();
    document.getElementById("name").value = d.name || "";
    document.getElementById("intro").value = d.intro || "";
    document.getElementById("contact").value = d.contact || "";
};

function showMessage(text, type) {
    const m = document.getElementById("message");
    m.textContent = text;
    m.className = `p-4 rounded ${type==="success"?"bg-green-100 text-green-800":"bg-red-100 text-red-800"}`;
    setTimeout(()=>m.classList.add("hidden"), 3000);
}

function getHeaders() {
    const c = JSON.parse(localStorage.getItem("githubConfig"));
    if (!c?.token) { showMessage("请先配置", "error"); return null; }
    return {
        "Authorization": `token ${c.token}`,
        "Content-Type": "application/json"
    };
}

function getConfig() {
    const c = JSON.parse(localStorage.getItem("githubConfig"));
    if (!c?.owner || !c?.repo) { showMessage("请先配置", "error"); return null; }
    return c;
}

// 中文不乱码核心
function utf8ToB64(s) { return btoa(unescape(encodeURIComponent(s))); }
function b64ToUtf8(b) { try { return decodeURIComponent(escape(atob(b))); } catch { return atob(b); } }

async function loadData() {
    const c = getConfig();
    if (!c) return { name:"", intro:"", contact:"", avatarUrl:"", games:[], designs:[], materials:[] };
    try {
        const r = await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}/contents/data.json?ref=${c.branch}`, {headers:getHeaders()});
        if (r.status===404) return { name:"", intro:"", contact:"", avatarUrl:"", games:[], designs:[], materials:[] };
        const d = await r.json();
        return JSON.parse(b64ToUtf8(d.content.replace(/\s/g,'')));
    } catch {
        return { name:"", intro:"", contact:"", avatarUrl:"", games:[], designs:[], materials:[] };
    }
}

async function saveDataToGitHub(newData) {
    const c = getConfig();
    if (!c) return false;
    try {
        let sha = "";
        const r = await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}/contents/data.json?ref=${c.branch}`, {headers:getHeaders()});
        if (r.ok) sha = (await r.json()).sha;
        const content = utf8ToB64(JSON.stringify(newData, null, 2));
        const resp = await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}/contents/data.json`, {
            method:"PUT", headers:getHeaders(),
            body:JSON.stringify({ message:"Update", content, sha, branch:c.branch })
        });
        return resp.ok;
    } catch { showMessage("保存失败", "error"); return false; }
}

async function uploadFile(file, path) {
    const c = getConfig();
    if (!c || !file) return null;
    return new Promise(resolve => {
        const r = new FileReader();
        r.onload = async () => {
            const content = btoa(r.result);
            const resp = await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}/contents/${path}`, {
                method:"PUT", headers:getHeaders(),
                body:JSON.stringify({ message:"Upload", content, branch:c.branch })
            });
            if (resp.ok) resolve(`https://raw.githubusercontent.com/${c.owner}/${c.repo}/${c.branch}/${path}`);
            else resolve(null);
        };
        r.readAsBinaryString(file);
    });
}

// ========== 头像 + 信息保存 ==========
async function saveInfoAndAvatar() {
    const name = document.getElementById("name").value.trim();
    const intro = document.getElementById("intro").value.trim();
    const contact = document.getElementById("contact").value.trim();
    const avatarFile = document.getElementById("avatarFile").files[0];
    
    const old = await loadData();
    let avatarUrl = old.avatarUrl;

    if (avatarFile) {
        showMessage("头像上传中...", "success");
        const fn = `avatar_${Date.now()}.jpg`;
        avatarUrl = await uploadFile(avatarFile, `assets/avatar/${fn}`);
    }

    const ok = await saveDataToGitHub({ ...old, name, intro, contact, avatarUrl });
    if (ok) showMessage("信息 + 头像保存成功", "success");
}

// 上传游戏
async function uploadGame() {
    const t = document.getElementById("gameTitle").value.trim();
    const d = document.getElementById("gameDesc").value.trim();
    const f = document.getElementById("gameImg").files[0];
    if (!t || !f) { showMessage("请填完整", "error"); return; }
    const url = await uploadFile(f, `assets/games/${Date.now()}_${f.name}`);
    if (!url) return;
    const old = await loadData();
    old.games.unshift({ title:t, desc:d, imgUrl:url });
    if (await saveDataToGitHub(old)) showMessage("上传成功", "success");
}

// 上传策划
async function uploadDesign() {
    const t = document.getElementById("designTitle").value.trim();
    const d = document.getElementById("designDesc").value.trim();
    const f = document.getElementById("designFile").files[0];
    if (!t || !f) { showMessage("请填完整", "error"); return; }
    const url = await uploadFile(f, `assets/designs/${Date.now()}_${f.name}`);
    if (!url) return;
    const old = await loadData();
    old.designs.unshift({ title:t, desc:d, fileUrl:url });
    if (await saveDataToGitHub(old)) showMessage("上传成功", "success");
}

// 上传素材
async function uploadMaterials() {
    const fs = document.getElementById("materialFiles").files;
    if (!fs.length) { showMessage("请选图片", "error"); return; }
    const old = await loadData();
    for (const f of fs) {
        const url = await uploadFile(f, `assets/materials/${Date.now()}_${f.name}`);
        if (url) old.materials.unshift({ url });
    }
    if (await saveDataToGitHub(old)) showMessage("上传成功", "success");
}
</script>
</body>
</html>
