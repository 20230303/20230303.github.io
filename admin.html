<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-50">
<div class="max-w-4xl mx-auto px-4 py-8">
  <div class="bg-white rounded-xl shadow p-6">
    <h1 class="text-2xl font-bold mb-4">GitHub 网页管理后台</h1>

    <div class="mb-6 p-4 bg-gray-100 rounded">
      <h3 class="font-bold mb-2">GitHub 配置</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <div><label>用户名</label><input id="owner" class="w-full border p-2"></div>
        <div><label>仓库名</label><input id="repo" class="w-full border p-2"></div>
        <div><label>分支</label><input id="branch" class="w-full border p-2" value="main"></div>
        <div><label>Token</label><input type="password" id="token" class="w-full border p-2"></div>
      </div>
      <button onclick="saveConfig()" class="mt-3 bg-blue-600 text-white px-4 py-2 rounded">保存配置</button>
    </div>

    <div class="mb-6">
      <h3 class="font-bold mb-2">个人信息</h3>
      <input id="name" placeholder="名字" class="w-full border p-2 mb-2">
      <textarea id="intro" placeholder="介绍" rows="3" class="w-full border p-2 mb-2"></textarea>
      <input id="contact" placeholder="联系方式" class="w-full border p-2 mb-2">
      <button onclick="saveProfile()" class="bg-green-600 text-white px-4 py-2 rounded">保存</button>
    </div>

    <div class="mb-6">
      <h3 class="font-bold mb-2">上传游戏作品</h3>
      <input id="g_title" placeholder="标题" class="w-full border p-2 mb-2">
      <textarea id="g_desc" placeholder="描述" rows="2" class="w-full border p-2 mb-2"></textarea>
      <input type="file" id="g_img" accept="image/*" class="mb-2">
      <button onclick="uploadGame()" class="bg-green-600 text-white px-4 py-2 rounded">上传</button>
    </div>

    <div id="msg" class="hidden p-3 rounded mt-4"></div>
  </div>
</div>

<script>
function cfg() { return JSON.parse(localStorage.githubConfig || "{}"); }
function setMsg(t,c){let m=document.getElementById("msg");m.textContent=t;m.className="p-3 rounded mt-4 "+c;m.classList.remove("hidden");setTimeout(()=>m.classList.add("hidden"),3000);}

function saveConfig() {
  localStorage.githubConfig = JSON.stringify({
    owner:document.getElementById("owner").value,
    repo:document.getElementById("repo").value,
    branch:document.getElementById("branch").value,
    token:document.getElementById("token").value
  });
  setMsg("配置已保存","bg-green-100 text-green-800");
}

async function loadData() {
  const c=cfg();
  try{
    const r=await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}/contents/data.json?ref=${c.branch}`,{headers:{authorization:`token ${c.token}`}});
    if(!r.ok)return {name:"",intro:"",contact:"",games:[],designs:[],materials:[]};
    const d=await r.json();
    return JSON.parse(decodeURIComponent(escape(atob(d.content))));
  }catch(e){
    return {name:"",intro:"",contact:"",games:[],designs:[],materials:[]};
  }
}

async function saveData(obj) {
  const c=cfg();
  let sha="";
  try{
    const r=await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}/contents/data.json?ref=${c.branch}`,{headers:{authorization:`token ${c.token}`}});
    if(r.ok){const d=await r.json();sha=d.sha;}
  }catch(e){}
  const content=btoa(unescape(encodeURIComponent(JSON.stringify(obj,null,2))));
  await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}/contents/data.json`,{
    method:"PUT",headers:{authorization:`token ${c.token}`,"Content-Type":"application/json"},
    body:JSON.stringify({message:"update",content,sha,branch:c.branch})
  });
}

async function uploadFile(file,path){
  const c=cfg();
  return new Promise((ok)=>{
    const r=new FileReader();
    r.onload=async()=>{
      await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}/contents/${path}`,{
        method:"PUT",headers:{authorization:`token ${c.token}`},
        body:JSON.stringify({message:"upload",content:btoa(r.result),branch:c.branch})
      });
      ok(`https://raw.githubusercontent.com/${c.owner}/${c.repo}/${c.branch}/${path}`);
    };
    r.readAsBinaryString(file);
  });
}

async function saveProfile(){
  const d=await loadData();
  d.name=document.getElementById("name").value;
  d.intro=document.getElementById("intro").value;
  d.contact=document.getElementById("contact").value;
  await saveData(d);
  setMsg("保存成功","bg-green-100 text-green-800");
}

async function uploadGame(){
  const t=document.getElementById("g_title").value;
  const d=document.getElementById("g_desc").value;
  const f=document.getElementById("g_img").files[0];
  if(!t||!f)return setMsg("请填标题和图片","bg-red-100 text-red-800");
  const url=await uploadFile(f,`assets/games/${Date.now()}-${f.name}`);
  const data=await loadData();
  data.games.unshift({title:t,desc:d,imgUrl:url});
  await saveData(data);
  setMsg("上传成功","bg-green-100 text-green-800");
}

window.onload=async()=>{
  const c=cfg();
  document.getElementById("owner").value=c.owner||"";
  document.getElementById("repo").value=c.repo||"";
  document.getElementById("branch").value=c.branch||"main";
  document.getElementById("token").value=c.token||"";
  const d=await loadData();
  document.getElementById("name").value=d.name||"";
  document.getElementById("intro").value=d.intro||"";
  document.getElementById("contact").value=d.contact||"";
};
</script>
</body>
</html>
