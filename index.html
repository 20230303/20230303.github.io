<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的游戏开发者主页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        html { scroll-behavior: smooth; }
        .card-hover { transition: all 0.3s; }
        .card-hover:hover { transform: translateY(-5px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <!-- 导航栏 -->
    <nav class="bg-white shadow-sm sticky top-0 z-10">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-indigo-600" id="siteTitle">游戏开发者主页</h1>
            <div class="hidden md:flex space-x-6">
                <a href="#about" class="hover:text-indigo-600">关于我</a>
                <a href="#games" class="hover:text-indigo-600">游戏作品</a>
                <a href="#designs" class="hover:text-indigo-600">游戏策划</a>
                <a href="#materials" class="hover:text-indigo-600">图像素材</a>
            </div>
            <a href="admin.html" class="text-sm bg-indigo-600 text-white px-3 py-1 rounded hover:bg-indigo-700">管理后台</a>
        </div>
    </nav>

    <!-- 关于我 -->
    <section id="about" class="py-12 bg-white">
        <div class="container mx-auto px-4">
            <h2 class="text-3xl font-bold mb-8 text-center">关于我</h2>
            <div class="max-w-2xl mx-auto">
                <p class="text-lg mb-4" id="userIntro">加载中...</p>
                <p class="text-gray-600" id="userContact">加载中...</p>
            </div>
        </div>
    </section>

    <!-- 游戏作品 -->
    <section id="games" class="py-12 bg-gray-50">
        <div class="container mx-auto px-4">
            <h2 class="text-3xl font-bold mb-8 text-center">游戏作品</h2>
            <div id="gameList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- 动态加载游戏作品 -->
                <div class="flex justify-center items-center h-40 text-gray-500">加载中...</div>
            </div>
        </div>
    </section>

    <!-- 游戏策划 -->
    <section id="designs" class="py-12 bg-white">
        <div class="container mx-auto px-4">
            <h2 class="text-3xl font-bold mb-8 text-center">游戏策划</h2>
            <div id="designList" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- 动态加载策划案 -->
                <div class="flex justify-center items-center h-40 text-gray-500">加载中...</div>
            </div>
        </div>
    </section>

    <!-- 图像素材 -->
    <section id="materials" class="py-12 bg-gray-50">
        <div class="container mx-auto px-4">
            <h2 class="text-3xl font-bold mb-8 text-center">图像素材</h2>
            <div id="materialList" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
                <!-- 动态加载素材 -->
                <div class="flex justify-center items-center h-40 text-gray-500">加载中...</div>
            </div>
        </div>
    </section>

    <footer class="bg-gray-800 text-white py-8">
        <div class="container mx-auto px-4 text-center">
            <p id="footerText">© 2025 游戏开发者主页</p>
        </div>
    </footer>

    <script>
        // 配置（替换为你的信息）
        const CONFIG = {
            owner: "你的GitHub用户名",  // 例如：octocat
            repo: "你的GitHub仓库名",    // 例如：octocat.github.io
            branch: "main"              // 仓库分支（一般是main或master）
        };

        // 从GitHub加载data.json数据
        async function loadData() {
            try {
                // 加载data.json
                const res = await fetch(`https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${CONFIG.branch}/data.json`);
                if (!res.ok) throw new Error("数据文件不存在，先去管理后台初始化");
                const data = await res.json();
                
                // 渲染个人信息
                document.getElementById("siteTitle").textContent = data.name || "游戏开发者主页";
                document.getElementById("userIntro").textContent = data.intro || "暂无介绍";
                document.getElementById("userContact").textContent = data.contact || "暂无联系方式";
                document.getElementById("footerText").textContent = `© 2025 ${data.name || "游戏开发者主页"}`;

                // 渲染游戏作品
                const gameList = document.getElementById("gameList");
                gameList.innerHTML = "";
                if (data.games && data.games.length > 0) {
                    data.games.forEach(game => {
                        const card = document.createElement("div");
                        card.className = "bg-white rounded-lg shadow card-hover overflow-hidden";
                        card.innerHTML = `
                            <img src="${game.imgUrl}" alt="${game.title}" class="w-full h-48 object-cover">
                            <div class="p-4">
                                <h3 class="font-bold text-xl mb-2">${game.title}</h3>
                                <p class="text-gray-600">${game.desc}</p>
                            </div>
                        `;
                        gameList.appendChild(card);
                    });
                } else {
                    gameList.innerHTML = "<div class='col-span-full text-center text-gray-500 py-8'>暂无游戏作品</div>";
                }

                // 渲染策划案
                const designList = document.getElementById("designList");
                designList.innerHTML = "";
                if (data.designs && data.designs.length > 0) {
                    data.designs.forEach(design => {
                        const card = document.createElement("div");
                        card.className = "bg-white rounded-lg shadow card-hover p-6";
                        card.innerHTML = `
                            <h3 class="font-bold text-xl mb-2">${design.title}</h3>
                            <p class="text-gray-600 mb-4">${design.desc}</p>
                            <a href="${design.fileUrl}" target="_blank" class="text-indigo-600 hover:underline">
                                <i class="fa fa-download mr-1"></i> 查看/下载
                            </a>
                        `;
                        designList.appendChild(card);
                    });
                } else {
                    designList.innerHTML = "<div class='col-span-full text-center text-gray-500 py-8'>暂无策划案</div>";
                }

                // 渲染图像素材
                const materialList = document.getElementById("materialList");
                materialList.innerHTML = "";
                if (data.materials && data.materials.length > 0) {
                    data.materials.forEach(material => {
                        const img = document.createElement("img");
                        img.src = material.url;
                        img.alt = "图像素材";
                        img.className = "rounded-lg shadow card-hover object-cover w-full h-32";
                        materialList.appendChild(img);
                    });
                } else {
                    materialList.innerHTML = "<div class='col-span-full text-center text-gray-500 py-8'>暂无图像素材</div>";
                }

            } catch (err) {
                console.error("加载数据失败：", err);
                document.getElementById("gameList").innerHTML = `<div class='col-span-full text-center text-red-500 py-8'>${err.message}</div>`;
                document.getElementById("designList").innerHTML = `<div class='col-span-full text-center text-red-500 py-8'>${err.message}</div>`;
                document.getElementById("materialList").innerHTML = `<div class='col-span-full text-center text-red-500 py-8'>${err.message}</div>`;
            }
        }

        // 页面加载时执行
        window.onload = loadData;
    </script>
</body>
</html>
