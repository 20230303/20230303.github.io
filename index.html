<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人主页</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  html{scroll-behavior:smooth;}
  .card-hover{transition:all .3s;transform:translateY(0)}
  .card-hover:hover{transform:translateY(-4px);box-shadow:0 10px 20px rgba(0,0,0,.1);}
</style>
</head>
<body class="bg-gray-50">

<nav class="fixed w-full bg-white shadow p-4 z-10">
  <div class="max-w-5xl mx-auto flex justify-between items-center">
    <a class="text-xl font-bold text-indigo-600" id="logo">GameDev<span class="text-emerald-500">.Me</span></a>
    <div class="flex gap-4">
      <a href="#about">关于</a>
      <a href="#games">作品</a>
      <a href="admin.html">管理</a>
    </div>
  </div>
</nav>

<div class="h-20"></div>

<div class="max-w-5xl mx-auto px-4">
  <section id="about" class="py-10">
    <h2 class="text-2xl font-bold mb-4">关于我</h2>
    <div class="p-6 bg-white rounded-xl shadow">
      <p class="text-lg mb-2" id="name_card"></p>
      <p class="text-gray-600 mb-2" id="intro_card"></p>
      <p class="text-gray-500" id="contact_card"></p>
    </div>
  </section>

  <section id="games" class="py-10">
    <h2 class="text-2xl font-bold mb-4">游戏作品</h2>
    <div id="game_list" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
  </section>
</div>

<script>
const CONFIG = {
  owner: "20230303",
  repo: "20230303.github.io",
  branch: "main"
};

async function load(){
  const res=await fetch(`https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${CONFIG.branch}/data.json`);
  const data=await res.json();
  document.getElementById("logo").innerHTML = `${data.name||"GameDev"}<span class="text-emerald-500">.Me</span>`;
  document.getElementById("name_card").textContent=data.name||"未设置";
  document.getElementById("intro_card").textContent=data.intro||"这家伙很懒什么都没写";
  document.getElementById("contact_card").textContent=data.contact||"无联系方式";

  const list=document.getElementById("game_list");
  if(data.games)data.games.forEach(g=>{
    const div=document.createElement("div");
    div.className="bg-white rounded-xl shadow p-4 card-hover";
    div.innerHTML=`<img src="${g.imgUrl}" class="rounded w-full h-40 object-cover mb-2"><h3 class="font-bold">${g.title}</h3><p class="text-sm text-gray-600">${g.desc}</p>`;
    list.appendChild(div);
  })
}
load();
</script>
</body>
</html>
