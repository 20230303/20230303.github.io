<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="assets/js/canvas-nest.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#10b981',
                        dark: '#1f2937',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto { content-visibility: auto; }
            .card-hover { @apply transition-all duration-300 hover:shadow-lg hover:-translate-y-1; }
            .text-shadow { text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
            .text-shadow-lg { text-shadow: 0 4px 20px rgba(0,0,0,0.5); }
            .bg-blur { backdrop-filter: blur(8px); }
        }
        .particle-layer {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .particle-layer canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        html { scroll-behavior: smooth; }
        
        /* 背景淡入动画 */
        .bg-fade {
            animation: bgFade 1.5s ease-in-out;
        }
        @keyframes bgFade {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        /* 内容上浮动画 */
        .fade-up {
            animation: fadeUp 1s ease-out;
        }
        @keyframes fadeUp {
            from { 
                opacity: 0;
                transform: translateY(30px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 延迟动画 */
        .delay-200 { animation-delay: 0.2s; animation-fill-mode: both; }
        .delay-400 { animation-delay: 0.4s; animation-fill-mode: both; }
        .delay-600 { animation-delay: 0.6s; animation-fill-mode: both; }
        .delay-800 { animation-delay: 0.8s; animation-fill-mode: both; }
        .delay-1000 { animation-delay: 1s; animation-fill-mode: both; }
        
        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* 导航按钮悬停效果 */
        .nav-btn {
            transition: all 0.3s ease;
        }
        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        /* 头像 3D 翻转动画 */
        .avatar-3d {
            perspective: 1000px;
        }
        .avatar-3d-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .avatar-3d:hover .avatar-3d-inner {
            transform: rotateY(180deg);
        }
        .avatar-front, .avatar-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 50%;
            overflow: hidden;
        }
        .avatar-front {
            background-color: white;
        }
        .avatar-back {
            background: linear-gradient(135deg, #6366f1 0%, #10b981 100%);
            transform: rotateY(180deg);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            border: 4px solid rgba(255,255,255,0.8);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .avatar-back i {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .avatar-back span {
            font-size: 0.875rem;
            font-weight: 500;
        }

        /* 打字机效果 */
        .typewriter {
            display: inline-flex;
            align-items: center;
            font-family: 'Courier New', monospace;
        }
        .typewriter-text {
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid white;
            animation: typing 3.5s steps(40, end), blink-caret 0.75s step-end infinite;
        }
        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }
        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: white }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

<!-- 首屏：极简风格（参考 dmego/home.github.io） -->
<section id="hero" class="relative h-screen w-full overflow-hidden">
    <!-- 背景图片层 -->
    <div id="bgImage" class="absolute inset-0 bg-cover bg-center bg-no-repeat bg-fade" style="background-image: url('https://picsum.photos/1920/1080?random=1');">
        <div class="absolute inset-0 bg-black/40"></div>
    </div>
    
    <!-- 居中内容 -->
    <div class="relative z-10 h-full flex flex-col items-center justify-center px-4">
        <!-- 头像（3D翻转动画） -->
        <div class="fade-up mb-6">
            <div class="avatar-3d w-32 h-32 md:w-40 md:h-40 cursor-pointer">
                <div class="avatar-3d-inner w-full h-full">
                    <!-- 正面：头像 -->
                    <div class="avatar-front">
                        <img id="avatarImg" 
                             class="w-full h-full object-cover"
                             src="https://via.placeholder.com/256?text=Avatar" 
                             alt="头像">
                    </div>
                    <!-- 背面：个性签名 -->
                    <div class="avatar-back">
                        <i class="fas fa-code"></i>
                        <span>Code Create Life</span>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 名字 -->
        <h1 id="heroName" class="fade-up delay-200 text-3xl md:text-5xl font-bold text-white text-shadow-lg mb-3">
            加载中...
        </h1>

        <!-- 打字机效果：Code Create Life -->
        <div class="fade-up delay-400 mb-6">
            <div class="typewriter text-white/90 text-lg md:text-xl text-shadow">
                <span id="typewriterText" class="typewriter-text">Code Create Life</span>
            </div>
        </div>
        
        <!-- 随机文案 -->
        <p id="randomQuote" class="fade-up delay-600 text-base md:text-lg text-white/80 text-shadow max-w-2xl text-center mb-10 italic">
            加载中...
        </p>
        
        <!-- 子页面导航按钮 -->
        <div class="fade-up delay-800 flex flex-wrap justify-center gap-4 mb-12">
            <a href="games.html" class="nav-btn bg-white/20 backdrop-blur-md text-white px-6 py-3 rounded-full font-medium border border-white/30 hover:bg-white/30 flex items-center">
                <i class="fas fa-gamepad mr-2"></i>游戏作品
            </a>
            <a href="designs.html" class="nav-btn bg-white/20 backdrop-blur-md text-white px-6 py-3 rounded-full font-medium border border-white/30 hover:bg-white/30 flex items-center">
                <i class="fas fa-file-alt mr-2"></i>设计拆解
            </a>
            <a href="materials.html" class="nav-btn bg-white/20 backdrop-blur-md text-white px-6 py-3 rounded-full font-medium border border-white/30 hover:bg-white/30 flex items-center">
                <i class="fas fa-images mr-2"></i>图像素材
            </a>
        </div>
        
        <!-- 社交链接 -->
        <div id="socialLinks" class="fade-up delay-1000 flex space-x-6">
            <a href="https://github.com/20230303" target="_blank" class="text-white/80 hover:text-white transition-colors hover:scale-110 transform duration-200">
                <i class="fab fa-github text-2xl"></i>
            </a>
            <a href="https://space.bilibili.com/496677580?spm_id_from=333.1007.0.0" target="_blank" class="text-white/80 hover:text-white transition-colors hover:scale-110 transform duration-200">
                <i class="fab fa-bilibili text-2xl"></i>
            </a>
            <a href="mailto:kang7520@foxmail.com" class="text-white/80 hover:text-white transition-colors hover:scale-110 transform duration-200">
                <i class="fas fa-envelope text-2xl"></i>
            </a>
        </div>
        
        <!-- 向下滚动提示 -->
        <div class="fade-up absolute bottom-10 left-1/2 transform -translate-x-1/2 animate-bounce" style="animation-delay: 1.2s; animation-fill-mode: both;">
            <a href="#about" class="text-white/70 hover:text-white transition-colors">
                <i class="fas fa-chevron-down text-2xl"></i>
            </a>
        </div>
    </div>
</section>

<!-- 关于我 -->
<section id="about" class="relative py-20 bg-white overflow-hidden">
    <div id="aboutParticleLayer" class="particle-layer"></div>
    <div class="relative z-10 container mx-auto px-4 md:px-8">
        <h2 class="text-3xl md:text-4xl font-bold text-center mb-12">关于我</h2>
        <div class="max-w-4xl mx-auto">
            <div class="flex flex-col md:flex-row gap-10 items-start">
                <div class="md:w-1/3">
                    <div class="bg-gradient-to-br from-primary/5 to-secondary/5 p-8 rounded-2xl border border-gray-100">

                        <ul class="space-y-4" id="contactList">
                            <li class="flex items-center">

                                <span id="infoContact" class="ml-3">暂无联系方式</span>
                            </li>
                            <li class="flex items-center">
                                <i class="fas fa-gamepad text-secondary w-7 text-center"></i>
                                <span class="ml-3">游戏开发/策划</span>
                            </li>
                            <li class="flex items-center">
                                <i class="fas fa-graduation-cap text-secondary w-7 text-center"></i>
                                <span class="ml-3">山西大学</span>
                            </li>
                        </ul>
                    </div>
                </div>
                <div class="md:w-2/3">
                    <h3 class="text-xl font-semibold mb-4 text-primary">个人简介</h3>
                    <p class="text-gray-700 leading-relaxed mb-6 whitespace-pre-line" id="infoIntro">
                        我是一名热爱游戏开发的独立创作者，致力于打造有趣、有温度的游戏作品。
                    </p>
                    <div class="flex flex-wrap gap-2">

                        <span class="bg-primary/10 text-primary px-4 py-2 rounded-full text-sm font-medium">Godot</span>
                        <span class="bg-primary/10 text-primary px-4 py-2 rounded-full text-sm font-medium">游戏策划</span>
                        <span class="bg-primary/10 text-primary px-4 py-2 rounded-full text-sm font-medium">像素艺术</span>
                        <span class="bg-primary/10 text-primary px-4 py-2 rounded-full text-sm font-medium">关卡设计</span>
                        <span class="bg-primary/10 text-primary px-4 py-2 rounded-full text-sm font-medium">2D游戏</span>
                        <span class="bg-primary/10 text-primary px-4 py-2 rounded-full text-sm font-medium">Java</span>

</section>

<!-- 页脚 -->
<footer class="bg-dark text-white py-12">
    <div class="container mx-auto px-4 md:px-8">
        <div class="flex flex-col md:flex-row justify-between items-center">
            <div class="mb-6 md:mb-0">
                <h3 class="text-2xl font-bold mb-2" id="footerTitle">个人主页</h3>
                <p class="text-gray-400" id="footerCopyright">© 2026 保留所有权利</p>
            </div>
            <div class="flex space-x-6">
                <a href="https://github.com/20230303" target="_blank" class="text-gray-400 hover:text-white transition-colors">
                    <i class="fab fa-github text-xl"></i>
                </a>
                <a href="https://space.bilibili.com/496677580?spm_id_from=333.1007.0.0" target="_blank" class="text-gray-400 hover:text-white transition-colors">
                    <i class="fab fa-bilibili text-xl"></i>
                </a>
                <a href="mailto:kang7520@foxmail.com" class="text-gray-400 hover:text-white transition-colors">
                    <i class="fas fa-envelope text-xl"></i>
                </a>
                <a href="admin.html" class="text-gray-400 hover:text-white transition-colors" title="管理后台">

        </div>
    </div>
</footer>

<script>
    const CONFIG = {
        owner: "20230303",
        repo: "20230303.github.io",
        branch: "main"
    };

    // 默认随机文案库
    const DEFAULT_QUOTES = [
        "游戏是第九艺术，也是梦想的载体。",
        "每一行代码，都是通往新世界的钥匙。",
        "用像素构建世界，用玩法传递情感。",
        "好的游戏，是玩家与开发者的一次心灵对话。",
        "热爱可抵岁月漫长，代码可筑梦想殿堂。",
        "游戏的本质，是让玩家成为更好的自己。",
        "在虚拟世界里，我们寻找真实的感动。",
        "每一个BUG，都是成长的勋章。",
        "策划的笔尖，画出的是玩家的笑容。",
        "独立游戏虽小，却装着整个宇宙。",
        "做游戏的人，心里都住着一个长不大的孩子。",
        "最好的游戏，永远是下一款。",
        "用有限的代码，创造无限的可能。",
        "玩家的快乐，是我们最大的成就感。",
        "游戏开发是一场漫长的修行，痛并快乐着。"
    ];

    // 默认背景图列表（使用 picsum 随机图，后续可替换为自定义图片）
    const DEFAULT_BG_IMAGES = [
        "https://picsum.photos/1920/1080?random=1",
        "https://picsum.photos/1920/1080?random=2",
        "https://picsum.photos/1920/1080?random=3",
        "https://picsum.photos/1920/1080?random=4",
        "https://picsum.photos/1920/1080?random=5",
        "https://picsum.photos/1920/1080?random=6",
        "https://picsum.photos/1920/1080?random=7",
        "https://picsum.photos/1920/1080?random=8"
    ];

    let currentQuotes = DEFAULT_QUOTES;
    let currentBgImages = DEFAULT_BG_IMAGES;

    function initParticleBackground(containerId, options = {}) {
        const container = document.getElementById(containerId);
        if (!container || typeof window.CanvasNest !== 'function') return;
        if (container.dataset.particleInitialized === 'true') return;

        container.dataset.particleInitialized = 'true';
        new window.CanvasNest(container, {
            color: '99,102,241',
            pointColor: '16,185,129',
            count: 70,
            opacity: 0.7,
            zIndex: -1,
            lineWidth: 0.5,
            dist: 170,
            ...options
        });
    }

    // 设置随机背景
    function setRandomBackground() {
        const randomIndex = Math.floor(Math.random() * currentBgImages.length);
        const bgImage = document.getElementById('bgImage');
        bgImage.style.backgroundImage = `url('${currentBgImages[randomIndex]}')`;
    }

    // 设置随机文案
    function setRandomQuote() {
        const randomIndex = Math.floor(Math.random() * currentQuotes.length);
        const quoteElement = document.getElementById('randomQuote');
        quoteElement.innerText = currentQuotes[randomIndex];
    }

    // 默认个人信息数据（首屏立即渲染，避免闪烁）
    const DEFAULT_DATA = {
        name: "平行弧线/桃",
        intro: "◩山西大学\n◪我是一名热爱游戏开发的独立创作者，致力于打造有趣、有温度的游戏作品\n◩LOL骨灰级玩家、牌佬、古法编程爱好者...",
        contact: "kang7520@foxmail.com",
        avatarUrl: "https://raw.githubusercontent.com/20230303/20230303.github.io/main/assets/avatar/avatar_1773590439310.jpg",
        backgrounds: [],
        quotes: []
    };

    // 渲染数据到页面
    function renderData(data) {
        document.title = `${data.name} - 个人主页`;
        document.getElementById("heroName").innerText = data.name;
        document.getElementById("infoName").innerText = data.name;
        document.getElementById("infoContact").innerText = data.contact || "暂无联系方式";
        document.getElementById("infoIntro").innerText = data.intro;
        document.getElementById("footerTitle").innerText = data.name;
        document.getElementById("footerCopyright").innerText = `© 2026 ${data.name}. 保留所有权利`;
        
        // 头像显示
        document.getElementById("avatarImg").src = data.avatarUrl || "https://via.placeholder.com/256?text=Avatar";

        // 自定义背景图（如果 data.json 中有配置）
        if (data.backgrounds && data.backgrounds.length > 0) {
            currentBgImages = data.backgrounds;
            setRandomBackground();
        }

        // 自定义文案（如果 data.json 中有配置）
        if (data.quotes && data.quotes.length > 0) {
            currentQuotes = data.quotes;
            setRandomQuote();
        }
    }

    // 异步加载 data.json 并更新（失败则保持默认数据）
    async function loadDataJson() {
        try {
            let res;
            
            // 先尝试本地加载（GitHub Pages 环境）
            try {
                res = await fetch(`data.json?t=${Date.now()}`);
            } catch (e) {
                // 本地 file:// 协议加载失败时，尝试从 GitHub 加载
                try {
                    res = await fetch(`https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${CONFIG.branch}/data.json?t=${Date.now()}`);
                } catch (e2) {
                    return; // 都失败了就保持默认数据
                }
            }
            
            if (res.ok) {
                const data = await res.json();
                renderData(data);
            }
        } catch (e) {
            // 静默失败，保持默认数据
        }
    }

    // 打字机效果 - Code Create Life 系列
    const TYPEWRITER_TEXTS = [
        "Code Create Life",
        "游戏是第九艺术",
        "用代码构建世界",
        "Game Developer",
        "热爱 · 创造 · 分享"
    ];

    let typewriterIndex = 0;
    let charIndex = 0;
    let isDeleting = false;
    let typewriterElement;

    function typeWriter() {
        if (!typewriterElement) return;
        
        const currentText = TYPEWRITER_TEXTS[typewriterIndex];
        
        if (isDeleting) {
            // 删除文字
            typewriterElement.textContent = currentText.substring(0, charIndex - 1);
            charIndex--;
        } else {
            // 打字
            typewriterElement.textContent = currentText.substring(0, charIndex + 1);
            charIndex++;
        }

        let typeSpeed = isDeleting ? 50 : 100;

        if (!isDeleting && charIndex === currentText.length) {
            // 打完了，停顿一下再删除
            typeSpeed = 4000;
            isDeleting = true;
        } else if (isDeleting && charIndex === 0) {
            // 删完了，切换到下一个
            isDeleting = false;
            typewriterIndex = (typewriterIndex + 1) % TYPEWRITER_TEXTS.length;
            typeSpeed = 500;
        }

        setTimeout(typeWriter, typeSpeed);
    }

    // 启动打字机效果（延迟启动，等入场动画完成）
    function startTypewriter() {
        typewriterElement = document.getElementById('typewriterText');
        if (typewriterElement) {
            // 先移除 CSS 动画
            typewriterElement.style.animation = 'none';
            typewriterElement.style.borderRight = '2px solid white';
            // 延迟启动打字机
            setTimeout(typeWriter, 1500);
        }
    }

    // 初始化
    window.addEventListener('DOMContentLoaded', () => {
        // 1. 立即用默认数据渲染（首屏无闪烁）
        renderData(DEFAULT_DATA);
        setRandomBackground();
        setRandomQuote();
        
        initParticleBackground('aboutParticleLayer');

        // 2. 异步加载 data.json，成功则更新数据
        loadDataJson();
        
        // 3. 启动打字机效果
        startTypewriter();
    });
</script>
</body>
</html>
